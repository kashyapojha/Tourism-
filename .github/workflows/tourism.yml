name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v3

      # 2️⃣ SonarCloud Scan (with Quality Gate)
      - name: SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=incredible-india_Incredible-India-Tourism
            -Dsonar.organization=incredible-india
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 3️⃣ Build Docker Image
      - run: docker build -t incredible-india .

      # 4️⃣ Push to DockerHub
      - run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag incredible-india ${{ secrets.DOCKER_USERNAME }}/incredible-india:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/incredible-india:latest